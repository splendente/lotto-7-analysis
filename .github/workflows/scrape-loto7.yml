name: Scrape Loto 7 Results

on:
  schedule:
    # Runs at 22:05 JST (13:05 UTC) every Friday
    - cron: '5 13 * * 5'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-and-pr:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chrome dependencies for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        run: node scripts/scrape.mjs

      - name: Run formatter
        run: pnpm run format

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add latest loto 7 results"
          title: "feat: add latest loto 7 results"
          body: |
            Automated PR to add the latest Loto 7 results.
            
            This PR is automatically created by a GitHub Actions workflow.
          branch: "chore/update-loto7-results"
          delete-branch: true
          base: main
